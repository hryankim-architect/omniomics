name: golden

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install omniomics (+ test extras)
        run: pip install -e ".[test]"
      - name: Golden tests (pytest) — GSE57577 reproduction + recorded-metric guards
        run: pytest -q
      # The full BRCA pipeline (golden/run_golden_brca.py) needs private TCGA/METABRIC data and
      # runs on the swarm host; CI guards the committed BRCA metric CSVs instead.
